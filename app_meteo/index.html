<!DOCTYPE html>
<html lang="it">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Cloud.Io</title>
        <!-- importazione mappa leaflet -->
        <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin=""/>
        <!-- importazione font -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900" rel="stylesheet">
        <!-- link per foglio di stile -->
        <link rel="stylesheet" href="css/style.css">
        <!-- favicon con logo -->
        <link rel="shortcut icon" href="img/logo.svg" type="image/x-icon">
    </head>
    
    <body>
        <!-- header con nome e logo del sito -->
        <header>
            <img src="img/logo.svg" alt="Logo" id="logo">
            <h1 class="poppins-bold">Cloud.Io</h1>
        </header>
        
        <main>
            <!-- input per la ricerca del comune -->
            <div id="form" class="poppins-regular">
                <div>
                    <button id="bottone_indietro" class="bottone"><img src="img/close.svg" alt="Indietro" id="x"></button>
                </div>
                <div id="ricerca_regioni">
                    <input list="lista_regioni" type="text" id="ricerca_regione" placeholder="Cerca qui" class="poppins-regular">
                    <datalist id="lista_regioni">
                    </datalist>
                </div>
                <div id="ricerca_province" style="display: none;">
                    <input list="lista_province" type="text" id="ricerca_provincia" placeholder="Cerca qui" class="poppins-regular">
                    <datalist id="lista_province">
                    </datalist>
                </div>
                <div id="ricerca_comuni" style="display: none;">
                    <input list="lista_comuni" type="text" id="ricerca_comune" placeholder="Cerca qui" class="poppins-regular">
                    <datalist id="lista_comuni">
                    </datalist>
                </div>
                <div>
                    <button id="bottone_ricerca" class="bottone"><img src="img/search.svg" alt="Ricerca" id="lens"></button>
                </div>
            </div>

            <!-- div che contiene un messaggio di errore, mostrato se input non valido o vuoto -->
            <div id="avviso_errore" class="poppins-regular">
                Inserisci una regione, una provincia e un comune validi.
            </div>

            <!-- div per feedback -->
            <div id="status" class="poppins-regular"></div>
            <!-- div per messaggi di errore -->
            <div id="output" class="poppins-bold"></div>

            <!-- div per la mappa-->
            <div id="map"></div>
            <!-- div contenente tutte le informazioni sul meteo -->
            <div id="container" style="display: none;">
                    <div id="meteo_comune">
                        <div id="info_comune" class="meteo_info poppins-regular"></div>
                        <div id="temperatura" class="meteo_info poppins-regular"></div>
                        <div id="dati_ambiente" class="meteo_info poppins-regular"></div>
                    </div>
                    <!-- bottone per andare alla pagina dettaglio.html -->
                    <a href="dettaglio.html" id="link_dettaglio"><button id="mostra_dettagli" class="poppins-semibold">Mostra dettagli</button></a>
            </div>
        </main>
        
        <!-- footer della pagina -->
        <footer class="poppins-regular">
            <div id="footer_brand">
                <img src="img/logo.svg" alt="Cloud.Io logo">
                <span>Cloud.Io</span>
            </div>

            <div id="links">
                <a href="index.html">Home</a>
                <a href="#">Contatti</a>
                <a href="#">Privacy</a>
            </div>

            <div id="footer_copy">
                © 2025 Cloud.Io · All rights reserved
            </div>
        </footer>

        

        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
        <script src="js/main.js"></script>


    </body>
</html>
