<!DOCTYPE html>
<html lang="it">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Nome app</title>

        <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin=""/>
        <style>
            #map {
                height: 400px; 
                width: 100%;
            }
        </style>
    </head>
    
    <body>
        <div>
            <h1>NOME APP</h1>
        </div>

        <div id="map"></div>

        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
        <script>
            // Crea la mappa centrata su Roma (puoi cambiare le coordinate)
            var map = L.map('map').setView([41.9028, 12.4964], 13);
        
            // Aggiungi le tile OpenStreetMap
            L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '&copy; OpenStreetMap contributors'
            }).addTo(map);
        
            // (Opzionale) Aggiungi un marker
            var marker = L.marker([41.9028, 12.4964]).addTo(map);
            marker.bindPopup("Ciao, questa è Roma!");
        </script>

        -->
    </body>
</html>
