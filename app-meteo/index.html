<!DOCTYPE html>
<html lang="it">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Nome app</title>

        <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin=""/>
        <style>
            #map {
                height: 400px; 
                width: 100%;
            }
        </style>
    </head>
    
    <body>
        <div>
            <h1>NOME APP</h1>
        </div>

        <div>
            <button id="bottone_indietro">Indietro</button>
        </div>

        <form action="" id="form">
            <div id="ricerca_regioni">
                <label for="ricerca_regione">Regione: </label>
                <input list="lista_regioni" type="text" id="ricerca_regione" placeholder="Cerca qui" >
                <datalist id="lista_regioni">
                </datalist>
            </div>
            <div id="ricerca_provincie" style="display: none;">
                <label for="ricerca_provincia">Provincia: </label>
                <input list="lista_provincie" type="text" id="ricerca_provincia" placeholder="Cerca qui" >
                <datalist id="lista_provincie">
                </datalist>
            </div>
            <div id="ricerca_comuni" style="display: none;">
                <label for="ricerca_comune">Comune: </label>
                <input list="lista_comuni" type="text" id="ricerca_comune" placeholder="Cerca qui" >
                <datalist id="lista_comuni">
                </datalist>
            </div>
            <div>
                <button id="bottone_ricerca">Ricerca</button>
            </div>
        </form>

        <p id="output"></p>

        <div id="map"></div>

        <div id="meteo_comune" style="display: none;">
            <div id="temperatura"></div>
            <div id="dati_ambiente"></div>
        </div>

        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
        <!--<script src="js/main.js"></script>-->
        <script src="js/main_01.js"></script>

    </body>
</html>
